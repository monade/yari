<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 Raycaster</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { image-rendering: pixelated; }
  #info { position: fixed; bottom: 10px; color: #888; font: 14px monospace; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">WASD + Q/E to move</div>
<script>
const SCREEN_W = 800, SCREEN_H = 600;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = SCREEN_W;
canvas.height = SCREEN_H;

// Scale canvas to fit window
function resize() {
  const scale = Math.min(window.innerWidth / SCREEN_W, window.innerHeight / SCREEN_H);
  canvas.style.width = (SCREEN_W * scale) + 'px';
  canvas.style.height = (SCREEN_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// Keyboard state
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toUpperCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toUpperCase()] = false; e.preventDefault(); });

// Map RC_KEY codes to JS key names
function rcKeyToJs(code) {
  if (code >= 65 && code <= 90) return String.fromCharCode(code);
  if (code === 32) return ' ';
  if (code === 262) return 'ARROWRIGHT';
  if (code === 263) return 'ARROWLEFT';
  if (code === 264) return 'ARROWDOWN';
  if (code === 265) return 'ARROWUP';
  if (code === 256) return 'ESCAPE';
  return '';
}

const importObject = {
  env: {
    sin: Math.sin,
    cos: Math.cos,
    tan: Math.tan,
    sqrt: Math.sqrt,
    floor: Math.floor,
    fabs: Math.abs,
    js_get_time: () => performance.now() / 1000.0,
    js_is_key_down: (code) => keys[rcKeyToJs(code)] ? 1 : 0,
  }
};

async function main() {
  const resp = await fetch('game.wasm');
  const { instance } = await WebAssembly.instantiate(await resp.arrayBuffer(), importObject);
  const exports = instance.exports;
  const memory = exports.memory;

  exports.wasm_init();

  const fbPtr = exports.get_framebuffer();
  const w = exports.get_fb_width();
  const h = exports.get_fb_height();
  const imageData = ctx.createImageData(w, h);

  function frame() {
    exports.wasm_frame();

    // Read RGBA framebuffer (pixel_t = uint32_t = 0xRRGGBBAA)
    const fb = new Uint32Array(memory.buffer, fbPtr, w * h);
    const pixels = imageData.data;
    for (let i = 0; i < w * h; i++) {
      const c = fb[i];
      const j = i * 4;
      pixels[j]     = (c >>> 24) & 0xFF; // R
      pixels[j + 1] = (c >>> 16) & 0xFF; // G
      pixels[j + 2] = (c >>> 8)  & 0xFF; // B
      pixels[j + 3] = 255;               // A
    }
    ctx.putImageData(imageData, 0, 0);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
main();
</script>
</body>
</html>
